<style>
:root {
  --sky: #5BB8F5;
  --sky-dark: #4A90E2;
  --sky-light: #87CEEB;
  --grass: #7CB342;
  --grass-light: #A5D6A7;
  --grass-dark: #558B2F;
  --dirt: #D2691E;
  --dirt-light: #F4A460;
  --dirt-mid: #E07856;
  --red: #C41E3A;
  --cream: #FFF8DC;
  --cream2: #FFFACD;
  --white: #FFFFFF;
  --shadow: rgba(0,0,0,0.12);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Sans GB','Microsoft JhengHei','PingFang TC',sans-serif;
  background: linear-gradient(160deg, #e8f4fd 0%, #f0f8e8 50%, #fff8e1 100%);
  min-height: 100vh;
  color: #2c3e50;
}

/* ===== HEADER ===== */
#header {
  background: linear-gradient(135deg, #1a6bb5 0%, #2e8de8 40%, #5BB8F5 80%, #87CEEB 100%);
  padding: 18px 20px 14px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 20px rgba(30,100,200,0.25);
}
.stripe-top {
  position: absolute; top: 0; left: 0; right: 0; height: 6px;
  background: repeating-linear-gradient(90deg, #C41E3A 0, #C41E3A 20px, #fff 20px, #fff 40px);
}
.stripe-bottom {
  position: absolute; bottom: 0; left: 0; right: 0; height: 4px;
  background: repeating-linear-gradient(90deg, #fff 0, #fff 20px, #C41E3A 20px, #C41E3A 40px);
}
.header-inner {
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
  position: relative; z-index: 1;
}
.ball-icon {
  width: 52px; height: 52px; flex-shrink: 0;
}
.header-title-block { flex: 1; min-width: 200px; }
.header-title {
  font-size: 1.6rem; font-weight: 900; color: #fff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3), 0 0 30px rgba(255,255,255,0.4);
  letter-spacing: 2px; line-height: 1.2;
}
.header-sub {
  font-size: 0.78rem; color: rgba(255,255,255,0.85);
  letter-spacing: 1px; margin-top: 2px;
}
.header-right {
  display: flex; flex-direction: column; align-items: flex-end; gap: 8px;
}
.mode-badge {
  background: rgba(255,255,255,0.25); color: #fff;
  padding: 4px 14px; border-radius: 20px; font-size: 0.78rem;
  border: 1px solid rgba(255,255,255,0.5); backdrop-filter: blur(4px);
}
.mode-btns { display: flex; gap: 8px; }
.btn-mode {
  padding: 8px 16px; border-radius: 22px; border: none; cursor: pointer;
  font-size: 0.82rem; font-weight: 700; transition: all 0.2s;
  box-shadow: 0 3px 10px rgba(0,0,0,0.2);
}
.btn-parent { background: #1a56a0; color: #fff; }
.btn-parent:hover { background: #1446880; transform: translateY(-1px); }
.btn-kid { background: #E07856; color: #fff; }
.btn-kid:hover { background: #c96040; transform: translateY(-1px); }
.btn-mode.active { transform: scale(1.06); box-shadow: 0 4px 14px rgba(0,0,0,0.3); }
.sync-badge {
  display: flex; align-items: center; gap: 6px;
  background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.45);
  border-radius: 14px; padding: 4px 12px; font-size: 0.74rem; color: #fff;
  backdrop-filter: blur(4px);
}
#syncDot { font-size: 0.8rem; }
#syncLabel { font-weight: 600; }
#syncTime { font-size: 0.68rem; color: rgba(255,255,255,0.75); }

/* ===== TABS ===== */
#tabs {
  display: flex; justify-content: center; gap: 10px;
  padding: 14px 16px 0;
}
.tab-btn {
  padding: 10px 28px; border-radius: 24px 24px 0 0;
  border: 2px solid transparent; cursor: pointer;
  font-size: 0.95rem; font-weight: 700;
  background: rgba(255,255,255,0.55);
  color: #555; transition: all 0.2s;
  border-bottom: none;
}
.tab-btn:hover { background: rgba(255,255,255,0.8); color: #2e8de8; }
.tab-btn.active {
  background: #fff; color: #2e8de8;
  border-color: #a8d8f8; border-bottom-color: #fff;
  box-shadow: 0 -3px 12px rgba(46,141,232,0.15);
}

/* ===== MAIN LAYOUT ===== */
#main {
  display: flex; gap: 14px;
  padding: 0 14px 20px;
  max-width: 1100px; margin: 0 auto;
}
#cal-panel {
  flex: 1; min-width: 0;
  background: #fff; border-radius: 0 0 16px 16px;
  border: 2px solid #a8d8f8; border-top: none;
  box-shadow: 0 4px 20px var(--shadow);
  overflow: hidden;
}
#sidebar { width: 220px; flex-shrink: 0; }

/* ===== CALENDAR ===== */
.cal-header {
  display: grid; grid-template-columns: repeat(7, 1fr);
  background: linear-gradient(90deg, #2e8de8, #5BB8F5);
}
.cal-header-cell {
  padding: 8px 4px; text-align: center;
  font-size: 0.78rem; font-weight: 700; color: #fff;
}
.cal-header-cell.sun { color: #ffd6d6; }
.cal-header-cell.sat { color: #d6eeff; }
.cal-grid {
  display: grid; grid-template-columns: repeat(7, 1fr);
  gap: 0;
}
.cal-cell {
  min-height: 90px; padding: 5px;
  border-right: 1px solid #e8f3ff;
  border-bottom: 1px solid #e8f3ff;
  background: #fff;
  vertical-align: top;
  position: relative;
}
.cal-cell:nth-child(7n) { border-right: none; }
.cal-cell.empty { background: #f8fbff; }
.cal-cell.today { background: #fffbe6; border: 2px solid #f5c518; }
.day-num {
  font-size: 0.78rem; font-weight: 700;
  color: #4a6fa5; margin-bottom: 3px;
  display: flex; align-items: center; justify-content: space-between;
}
.day-num.sun-num { color: #C41E3A; }
.day-num.sat-num { color: #2e8de8; }
.add-task-btn {
  background: none; border: none; cursor: pointer;
  color: #a0c4e8; font-size: 0.95rem; line-height: 1;
  padding: 0 2px; display: none;
  font-weight: 700;
}
.cal-cell:hover .add-task-btn { display: inline; }
.add-task-btn:hover { color: #2e8de8; }

/* ===== TASKS ===== */
.task-row {
  display: flex; align-items: center; gap: 4px;
  padding: 2px 4px; border-radius: 5px;
  cursor: pointer; transition: background 0.15s;
  margin-bottom: 1px;
  min-height: 20px;
}
.task-row:hover { background: #f0f8ff; }
.task-row.done { background: #e8f8ec !important; }
.task-cb {
  width: 13px; height: 13px; border-radius: 3px;
  border: 1.5px solid #aac4e8; background: #fff;
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 0.6rem; color: #27ae60; font-weight: 900; transition: all 0.15s;
}
.task-row.done .task-cb { background: #27ae60; border-color: #27ae60; color: #fff; }
.task-text {
  font-size: 0.68rem; color: #334; flex: 1; line-height: 1.3;
  word-break: break-all;
}
.task-row.done .task-text { text-decoration: line-through; color: #7db87d; }
.task-del {
  background: none; border: none; cursor: pointer;
  color: #e08080; font-size: 0.7rem; padding: 0 1px;
  display: none; line-height: 1;
}
.task-row:hover .task-del { display: inline; }

/* ===== ADD INPUT ===== */
.add-row {
  display: flex; gap: 3px; margin-top: 3px;
}
.add-input {
  flex: 1; font-size: 0.65rem; padding: 3px 5px;
  border: 1px solid #a8d8f8; border-radius: 5px; outline: none;

.add-input:focus { border-color: #2e8de8; background: #fff; }
.add-confirm-btn {

  border-radius: 5px; padding: 3px 7px; cursor: pointer;
  font-size: 0.7rem; font-weight: 700;
}

/* ===== SIDEBAR ===== */
.sidebar-card {

  padding: 12px; margin-bottom: 12px;

.score-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.score-box {
  background: linear-gradient(135deg, #e8f4ff, #f0fff4);
  border-radius: 10px; padding: 8px 6px; text-align: center;
  border: 1.5px solid #c8e6ff;
}
.score-val { font-size: 1.4rem; font-weight: 900; color: #2e8de8; line-height: 1; }
.score-lbl { font-size: 0.6rem; color: #778; margin-top: 2px; font-weight: 600; }
.score-box.orange .score-val { color: #E07856; }
.score-box.green .score-val { color: #27ae60; }
.score-box.red .score-val { color: #C41E3A; }

.badge-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.badge-box {
  border-radius: 10px; padding: 10px 6px; text-align: center;
  border: 2px solid transparent; transition: all 0.2s;
}
.badge-box.unlocked {
  background: linear-gradient(135deg, #fff8dc, #fffacd);
  border-color: #f5c518;
  box-shadow: 0 0 12px rgba(245,197,24,0.3);
}
.badge-box.locked {
  background: #f5f5f5; border-color: #ddd; opacity: 0.5;
}
.badge-icon { font-size: 1.5rem; margin-bottom: 4px; }
.badge-name { font-size: 0.6rem; font-weight: 700; color: #555; }

/* ===== EFFECT OVERLAY ===== */
#hit-effect {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none; z-index: 9999;
}
.hit-ball {
  position: absolute;
  animation: fly-ball 0.9s ease-out forwards;
  font-size: 1.6rem;
}
@keyframes fly-ball {
  0% { transform: translate(0,0) scale(1); opacity: 1; }
  60% { transform: translate(var(--tx), var(--ty)) scale(1.3); opacity: 1; }
  100% { transform: translate(calc(var(--tx)*1.6), calc(var(--ty)*1.6)) scale(0.3); opacity: 0; }
}
.hit-star {
  position: absolute;
  animation: pop-star 0.7s ease-out forwards;
  font-size: 1rem;
  color: #f5c518;
  font-weight: 900;
}
@keyframes pop-star {
  0% { transform: scale(0); opacity: 1; }
  50% { transform: scale(1.5); opacity: 1; }
  100% { transform: scale(0.8) translateY(-30px); opacity: 0; }
}

/* ===== RESPONSIVE ===== */
@media (max-width: 700px) {
  #main { flex-direction: column; padding: 0 8px 16px; }
  #sidebar { width: 100%; }
  .header-title { font-size: 1.1rem; }
  .cal-cell { min-height: 60px; }
  .task-text { font-size: 0.6rem; }
}
</style>

// ===== INIT DATA =====
function initDataFromDefaults() {
  const data = {};
  for (const key in DEFAULT_TASKS) {
    data[key] = DEFAULT_TASKS[key].map(t => ({ id: t.id, text: t.text, done: t.done }));
  }
  return data;
}

// ===== MERGE: keep user changes, fill missing with defaults =====
function mergeWithDefaults(fbData) {
  const merged = {};
  // Start with defaults
  const defaults = initDataFromDefaults();
  for (const k in defaults) merged[k] = defaults[k];
  // Overlay firebase data (user changes win)
  if (fbData) {
    for (const k in fbData) {
      const arr = fbData[k];
      if (Array.isArray(arr)) {
        merged[k] = arr;
      } else if (arr && typeof arr === 'object') {
        // Firebase may store as object with numeric keys
        merged[k] = Object.values(arr);
      }
    }
  }
  return merged;
}

  const lbl = document.getElementById('syncLabel');
  if (status === 'ok') { dot.textContent = '\u{1F7E2}'; lbl.textContent = '已同步'; }
  else if (status === 'syncing') { dot.textContent = '\u{1F7E1}'; lbl.textContent = '同步中'; }
  else { dot.textContent = '\u{1F534}'; lbl.textContent = '離線'; }
}

function setSyncTime() {
  const t = document.getElementById('syncTime');
  const now = new Date();
  t.textContent = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
}

function writeToFirebase() {
  setSyncStatus('syncing');
  db.ref(FB_PATH).set(appData)
    .then(() => { setSyncStatus('ok'); setSyncTime(); saveLoc(); })
    .catch(() => { setSyncStatus('offline'); saveLoc(); });
}

function scheduleWrite() {
  if (pendingWrite) clearTimeout(pendingWrite);
  pendingWrite = setTimeout(writeToFirebase, 600);
}

function saveLoc() {
  try { localStorage.setItem('wuq2026', JSON.stringify(appData)); } catch(e) {}
}

function loadLoc() {
  try {
    const s = localStorage.getItem('wuq2026');
    if (s) return JSON.parse(s);
  } catch(e) {}
  return null;
}

// ===== LISTEN =====
db.ref(FB_PATH).on('value', snap => {
  const fbData = snap.val();
  if (!firebaseReady) {
    firebaseReady = true;
    setSyncStatus('ok'); setSyncTime();
    if (fbData && Object.keys(fbData).length > 0) {
      // Firebase has data - use it (user changes are in firebase)
      appData = mergeWithDefaults(fbData);
    } else {
      // No firebase data yet - check localStorage, then default
      const loc = loadLoc();
      appData = loc ? mergeWithDefaults(loc) : initDataFromDefaults();
      // Write defaults to firebase
      writeToFirebase();
    }
    renderCal();
    updateScoreboard();
  } else {
    if (fbData) {
      appData = mergeWithDefaults(fbData);
      setSyncStatus('ok'); setSyncTime();
      saveLoc();
      renderCal();
      updateScoreboard();
    }
  }
}, err => {
  setSyncStatus('offline');
  if (!firebaseReady) {
    firebaseReady = true;
    const loc = loadLoc();
    appData = loc ? mergeWithDefaults(loc) : initDataFromDefaults();
    renderCal();
    updateScoreboard();
  }
});

// ===== MODE =====
function setMode(m) {
  currentMode = m;
  document.getElementById('modeBadge').textContent = '目前模式：' + (m === 'parent' ? '家長模式' : '吳Q模式');
  document.querySelectorAll('.btn-mode').forEach(b => b.classList.remove('active'));
  document.querySelector(m === 'parent' ? '.btn-parent' : '.btn-kid').classList.add('active');
  renderCal();
}

// ===== MONTH SWITCH =====
function switchMonth(m) {
  currentMonth = m;
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', [6,7,8][i] === m));
  renderCal();
}

// ===== RENDER CAL =====
function renderCal() {
  const cfg = CAL_CONFIG[currentMonth];
  const grid = document.getElementById('calGrid');
  grid.innerHTML = '';
  const today = new Date();
  const todayKey = dayKey(today.getFullYear(), today.getMonth()+1, today.getDate());

  // Leading empty cells
  for (let i = 0; i < cfg.firstDow; i++) {
    const el = document.createElement('div');
    el.className = 'cal-cell empty';
    grid.appendChild(el);
  }

  for (let d = 1; d <= cfg.days; d++) {
    const dow = (cfg.firstDow + d - 1) % 7;
    const k = dayKey(cfg.year, currentMonth, d);
    const tasks = appData[k] || [];
    const isToday = (k === todayKey);

    const cell = document.createElement('div');
    cell.className = 'cal-cell' + (isToday ? ' today' : '');

    // Day number
    const dn = document.createElement('div');
    dn.className = 'day-num' + (dow === 0 ? ' sun-num' : dow === 6 ? ' sat-num' : '');
    dn.innerHTML = d;
    if (currentMode === 'parent') {
      const ab = document.createElement('button');
      ab.className = 'add-task-btn';
      ab.textContent = '+';
      ab.setAttribute('data-key', k);
      ab.onclick = function(e) { e.stopPropagation(); showAddInput(k, cell); };
      dn.appendChild(ab);
    }
    cell.appendChild(dn);

    // Tasks
    tasks.forEach((task, idx) => {
      if (!task) return;
      const row = buildTaskRow(task, k, idx);
      cell.appendChild(row);
    });

    grid.appendChild(cell);
  }

  // Trailing cells to complete last row
  const totalCells = cfg.firstDow + cfg.days;
  const rem = totalCells % 7;
  if (rem !== 0) {
    for (let i = 0; i < 7 - rem; i++) {
      const el = document.createElement('div');
      el.className = 'cal-cell empty';
      grid.appendChild(el);
    }
  }
}

function buildTaskRow(task, key, idx) {
  const row = document.createElement('div');
  row.className = 'task-row' + (task.done ? ' done' : '');
  row.onclick = function() { toggleTask(key, idx); };

  const cb = document.createElement('div');
  cb.className = 'task-cb';
  cb.textContent = task.done ? '\u2713' : '';
  row.appendChild(cb);

  const txt = document.createElement('div');
  txt.className = 'task-text';
  txt.textContent = task.text;
  row.appendChild(txt);

  if (currentMode === 'parent') {
    const del = document.createElement('button');
    del.className = 'task-del';
    del.textContent = '\u00D7';
    del.onclick = function(e) { e.stopPropagation(); deleteTask(key, idx); };
    row.appendChild(del);
  }
  return row;
}

// ===== ADD INPUT =====
function showAddInput(key, cell) {
  // Remove existing add rows
  cell.querySelectorAll('.add-row').forEach(r => r.remove());
  const row = document.createElement('div');
  row.className = 'add-row';
  const inp = document.createElement('input');
  inp.className = 'add-input';
  inp.type = 'text';
  inp.placeholder = '新增任務...';
  inp.maxLength = 40;
  const btn = document.createElement('button');
  btn.className = 'add-confirm-btn';
  btn.textContent = '+';
  btn.onclick = function() {
    const txt = inp.value.trim();
    if (txt) { addTask(key, txt); }
    row.remove();
  };
  inp.onkeydown = function(e) {
    if (e.key === 'Enter') btn.click();
    if (e.key === 'Escape') row.remove();
  };
  row.appendChild(inp);
  row.appendChild(btn);
  cell.appendChild(row);
  inp.focus();
}

// ===== TASK ACTIONS =====
function ensureArr(key) {
  if (!appData[key]) appData[key] = [];
}

function addTask(key, text) {
  ensureArr(key);
  appData[key].push({ id: Date.now(), text: text, done: false });
  scheduleWrite();
  renderCal();
  updateScoreboard();
}

function deleteTask(key, idx) {
  if (!appData[key]) return;
  appData[key].splice(idx, 1);
  scheduleWrite();
  renderCal();
  updateScoreboard();
}

function toggleTask(key, idx) {
  if (!appData[key] || !appData[key][idx]) return;
  const wasOff = !appData[key][idx].done;
  appData[key][idx].done = wasOff;
  if (wasOff) {
    playHitSound();
    showHitEffect();
  }
  scheduleWrite();
  renderCal();
  updateScoreboard();
}

// ===== SCOREBOARD =====
function updateScoreboard() {
  let total = 0, done = 0;
  const allKeys = Object.keys(appData);
  const cfg = CAL_CONFIG[currentMonth];
  const monthKeys = allKeys.filter(k => {
    const parts = k.split('-');
    return parseInt(parts[1]) === currentMonth;
  });
  monthKeys.forEach(k => {
    (appData[k] || []).forEach(t => {
      total++;
      if (t.done) done++;
    });
  });

  // Streak: consecutive days with at least one task completed
  let streak = 0;
  const today = new Date();
  let d = new Date(today);
  for (let i = 0; i < 60; i++) {
    const k = dayKey(d.getFullYear(), d.getMonth()+1, d.getDate());
    const tasks = appData[k] || [];
    const hasDone = tasks.some(t => t.done);
    const hasAny = tasks.length > 0;
    if (hasAny && hasDone) { streak++; d.setDate(d.getDate()-1); }
    else if (!hasAny) { d.setDate(d.getDate()-1); }
    else break;
  }

  const rate = total > 0 ? Math.round(done / total * 100) : 0;

  // Badges
  const badgesUnlocked = [];
  if (done >= 5) badgesUnlocked.push('hr');
  if (done >= 20) badgesUnlocked.push('mvp');
  if (streak >= 7) badgesUnlocked.push('shutout');
  if (done >= 50) badgesUnlocked.push('ko');

  document.getElementById('sc-done').textContent = done;
  document.getElementById('sc-streak').textContent = streak;
  document.getElementById('sc-badge').textContent = badgesUnlocked.length;
  document.getElementById('sc-rate').textContent = rate + '%';

  ['hr','mvp','shutout','ko'].forEach(id => {
    const el = document.getElementById('badge-' + id);
    const on = badgesUnlocked.includes(id);
    el.className = 'badge-box ' + (on ? 'unlocked' : 'locked');
  });
}

// ===== AUDIO =====
function playHitSound() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(600, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(900, ctx.currentTime + 0.08);
    osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.3);
    gain.gain.setValueAtTime(0.3, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  } catch(e) {}
}

// ===== HIT EFFECT =====
function showHitEffect() {
  const ef = document.getElementById('hit-effect');
  const cx = window.innerWidth * 0.5;
  const cy = window.innerHeight * 0.5;

  for (let i = 0; i < 3; i++) {
    const b = document.createElement('div');
    b.className = 'hit-ball';
    b.textContent = '\u26BE';
    const tx = (Math.random()-0.5)*300;
    const ty = -(Math.random()*200 + 80);
    b.style.left = (cx + (Math.random()-0.5)*100) + 'px';
    b.style.top = cy + 'px';
    b.style.setProperty('--tx', tx + 'px');
    b.style.setProperty('--ty', ty + 'px');
    b.style.animationDelay = (i * 0.1) + 's';
    ef.appendChild(b);
    setTimeout(() => b.remove(), 1200);
  }

  const stars = ['*','*','*'];
  stars.forEach((s, i) => {
    const st = document.createElement('div');
    st.className = 'hit-star';
    st.textContent = '\u2605';
    st.style.left = (cx + (Math.random()-0.5)*120) + 'px';
    st.style.top = (cy - 40 + (Math.random()-0.5)*60) + 'px';
    st.style.animationDelay = (i * 0.08) + 's';
    ef.appendChild(st);
    setTimeout(() => st.remove(), 900);
  });
}

// ===== INITIAL RENDER (show something while firebase loads) =====
(function() {
  const loc = loadLoc();
  appData = loc ? mergeWithDefaults(loc) : initDataFromDefaults();
  renderCal();
  updateScoreboard();
})();
</script>
